services:
  opensandbox:
    image: opensandbox/server:latest
    ports:
      - "8080:8080"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - ./sandbox.config.toml:/etc/opensandbox/config.toml
    environment:
      - OPENSANDBOX_INSECURE_SERVER=YES
    restart: unless-stopped

  mongodb:
    image: mongo:7
    ports:
      - "27017:27017"
    volumes:
      - mongodb_data:/data/db
    restart: unless-stopped

volumes:
  mongodb_data: